<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>НоваМедика — Панель фармацевта</title>
    <style>
        /* ===============================
           NovaMedika2 Design System
           (Tailwind-like, matching project)
           =============================== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --blue-50: #eff6ff;
            --blue-100: #dbeafe;
            --blue-200: #bfdbfe;
            --blue-300: #93c5fd;
            --blue-500: #3b82f6;
            --blue-600: #2563eb;
            --blue-700: #1d4ed8;
            --blue-900: #1e3a5f;
            --green-50: #f0fdf4;
            --green-100: #dcfce7;
            --green-200: #bbf7d0;
            --green-500: #22c55e;
            --green-600: #16a34a;
            --green-700: #15803d;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --white: #ffffff;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-full: 9999px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-color: var(--gray-50);
            height: 100vh;
            color: var(--gray-900);
            line-height: 1.6;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
            max-width: 1200px;
            margin: 0 auto;
            box-shadow: var(--shadow-lg);
            background: var(--white);
            overflow: hidden;
        }

        /* ========================
           SIDEBAR
           ======================== */
        .sidebar {
            width: 380px;
            min-width: 320px;
            background: var(--white);
            border-right: 1px solid var(--gray-200);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 16px 20px;
            background: var(--white);
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-shrink: 0;
        }

        .sidebar-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .pharmacist-avatar {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-full);
            background: linear-gradient(135deg, var(--blue-600), #6366f1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-weight: 600;
            font-size: 18px;
            flex-shrink: 0;
        }

        .pharmacist-info h2 {
            font-size: 15px;
            font-weight: 600;
            color: var(--gray-900);
            letter-spacing: 0.3px;
        }

        .pharmacist-info p {
            font-size: 12px;
            color: var(--gray-500);
        }

        .online-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: var(--radius-full);
            font-size: 13px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
        }
        .online-toggle.online {
            background: var(--green-100);
            color: var(--green-700);
        }
        .online-toggle.offline {
            background: var(--gray-100);
            color: var(--gray-500);
        }
        .online-toggle .toggle-dot {
            width: 8px;
            height: 8px;
            border-radius: var(--radius-full);
        }
        .online-toggle.online .toggle-dot { background: var(--green-500); }
        .online-toggle.offline .toggle-dot { background: var(--gray-400); }

        /* Search */
        .search-bar {
            padding: 10px 16px;
            flex-shrink: 0;
        }

        .search-input-wrapper {
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            border-radius: 10px;
            padding: 8px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: border-color 0.15s;
        }
        .search-input-wrapper:focus-within {
            border-color: var(--blue-500);
            box-shadow: 0 0 0 2px var(--blue-100);
        }

        .search-input-wrapper svg {
            flex-shrink: 0;
            color: var(--gray-400);
        }

        .search-input-wrapper input {
            border: none;
            background: transparent;
            outline: none;
            font-family: inherit;
            font-size: 14px;
            width: 100%;
            color: var(--gray-900);
        }
        .search-input-wrapper input::placeholder { color: var(--gray-400); }

        /* Filter tabs */
        .filter-tabs {
            display: flex;
            gap: 6px;
            padding: 0 16px 10px;
            flex-shrink: 0;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .filter-tabs::-webkit-scrollbar { display: none; }

        .filter-tab {
            padding: 6px 14px;
            border-radius: var(--radius-full);
            font-size: 12px;
            font-weight: 500;
            border: 1px solid var(--gray-200);
            background: transparent;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
            color: var(--gray-500);
            font-family: inherit;
        }
        .filter-tab:hover {
            background: var(--gray-100);
        }
        .filter-tab.active {
            background: var(--blue-600);
            color: var(--white);
            border-color: var(--blue-600);
        }
        .filter-tab .count-badge {
            display: inline-block;
            background: rgba(0, 0, 0, 0.08);
            border-radius: var(--radius-full);
            padding: 1px 8px;
            font-size: 11px;
            margin-left: 4px;
        }
        .filter-tab.active .count-badge {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Chat list */
        .chat-list {
            flex: 1;
            overflow-y: auto;
        }
        .chat-list::-webkit-scrollbar { width: 6px; }
        .chat-list::-webkit-scrollbar-track { background: transparent; }
        .chat-list::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 3px; }
        .chat-list::-webkit-scrollbar-thumb:hover { background: var(--gray-400); }

        .chat-item {
            display: flex;
            padding: 12px 16px;
            gap: 12px;
            cursor: pointer;
            transition: background 0.15s;
            border-bottom: 1px solid var(--gray-100);
            align-items: flex-start;
        }
        .chat-item:hover { background: var(--gray-50); }
        .chat-item.active { background: var(--blue-50); }

        .chat-item-avatar {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-full);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
            color: var(--white);
            position: relative;
        }
        .chat-item-avatar .online-badge {
            position: absolute;
            bottom: 1px;
            right: 1px;
            width: 12px;
            height: 12px;
            border-radius: var(--radius-full);
            border: 2px solid var(--white);
            background: var(--green-500);
        }

        .chat-item-content {
            flex: 1;
            min-width: 0;
        }

        .chat-item-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3px;
        }

        .chat-item-name {
            font-size: 15px;
            font-weight: 500;
            color: var(--gray-900);
        }

        .chat-item-time {
            font-size: 11px;
            color: var(--gray-400);
            flex-shrink: 0;
        }

        .chat-item-preview {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .chat-item-text {
            font-size: 13px;
            color: var(--gray-500);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .chat-item-badge {
            background: var(--blue-600);
            color: var(--white);
            font-size: 11px;
            font-weight: 600;
            min-width: 20px;
            height: 20px;
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 6px;
            flex-shrink: 0;
        }

        .chat-item-status {
            font-size: 11px;
            color: #d97706;
            font-weight: 500;
            margin-top: 2px;
        }

        /* ========================
           CHAT PANEL
           ======================== */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--gray-100);
            position: relative;
        }
        .chat-panel.empty {
            justify-content: center;
            align-items: center;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--gray-500);
        }
        .empty-state svg { margin-bottom: 16px; opacity: 0.25; }
        .empty-state h3 { color: var(--gray-800); font-size: 18px; margin-bottom: 8px; font-weight: 600; }
        .empty-state p { font-size: 14px; }

        /* Chat header */
        .chat-header {
            background: var(--white);
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--gray-200);
            flex-shrink: 0;
            z-index: 10;
        }

        .chat-header-avatar {
            width: 38px;
            height: 38px;
            border-radius: var(--radius-full);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 15px;
            color: var(--white);
        }

        .chat-header-info { flex: 1; min-width: 0; }
        .chat-header-name { font-size: 15px; font-weight: 600; color: var(--gray-900); letter-spacing: 0.3px; }
        .chat-header-status { font-size: 12px; }
        .chat-header-status.online { color: var(--green-600); }
        .chat-header-status.offline { color: var(--gray-500); }

        .chat-header-actions { display: flex; gap: 4px; }

        .chat-header-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            color: var(--gray-500);
            border-radius: var(--radius-full);
            transition: background 0.15s;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chat-header-btn:hover { background: var(--gray-100); }

        /* Messages */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px 18px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            scroll-behavior: smooth;
        }
        .messages-area::-webkit-scrollbar { width: 6px; }
        .messages-area::-webkit-scrollbar-track { background: transparent; }
        .messages-area::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 3px; }
        .messages-area::-webkit-scrollbar-thumb:hover { background: var(--gray-400); }

        .message-wrapper {
            display: flex;
            margin-bottom: 2px;
            max-width: 80%;
            animation: messageIn 0.25s ease-out;
        }
        @keyframes messageIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-wrapper.pharmacist { align-self: flex-end; flex-direction: row-reverse; }
        .message-wrapper.user { align-self: flex-start; }

        .message-avatar {
            width: 28px;
            height: 28px;
            border-radius: var(--radius-full);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            color: var(--white);
            margin-top: 4px;
        }
        .message-wrapper.user .message-avatar { margin-right: 8px; }
        .message-wrapper.pharmacist .message-avatar { margin-left: 8px; }

        .message-bubble {
            padding: 10px 16px;
            border-radius: var(--radius-md);
            position: relative;
            word-wrap: break-word;
            min-width: 60px;
        }
        .message-wrapper.pharmacist .message-bubble {
            background: #dcf8c6;
            color: var(--gray-900);
            border-bottom-right-radius: 4px;
        }
        .message-wrapper.user .message-bubble {
            background: var(--white);
            color: var(--gray-900);
            border-bottom-left-radius: 4px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-200);
        }

        .message-text {
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .message-meta {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
            margin-top: 3px;
        }
        .message-time { font-size: 10px; opacity: 0.7; letter-spacing: 0.2px; }
        .message-wrapper.user .message-time { color: var(--gray-500); }
        .message-wrapper.pharmacist .message-time { color: rgba(0, 0, 0, 0.45); }

        .message-sender-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--blue-600);
            margin-bottom: 2px;
            letter-spacing: 0.3px;
        }

        /* Typing indicator */
        .typing-indicator {
            align-self: flex-start;
            display: none;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
        }
        .typing-indicator.active { display: flex; }
        .typing-dots {
            background: var(--white);
            padding: 8px 14px;
            border-radius: var(--radius-md);
            border-bottom-left-radius: 4px;
            box-shadow: var(--shadow-sm);
            display: flex;
            gap: 3px;
            align-items: center;
            border: 1px solid var(--gray-200);
        }
        .typing-dots span {
            width: 6px;
            height: 6px;
            background: var(--gray-400);
            border-radius: var(--radius-full);
            animation: typingBounce 1.4s infinite ease-in-out;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* Date separator */
        .date-sep { text-align: center; margin: 8px 0; }
        .date-sep span {
            background: rgba(0, 0, 0, 0.06);
            padding: 4px 14px;
            border-radius: var(--radius-full);
            font-size: 11px;
            color: var(--gray-500);
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        /* Input area */
        .input-area {
            background: var(--white);
            padding: 10px 14px 12px;
            border-top: 1px solid var(--gray-200);
            flex-shrink: 0;
        }

        .input-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }

        .input-field-wrapper {
            flex: 1;
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-lg);
            padding: 4px 4px 4px 16px;
            display: flex;
            align-items: flex-end;
            gap: 4px;
            transition: border-color 0.15s;
        }
        .input-field-wrapper:focus-within {
            border-color: var(--blue-500);
            box-shadow: 0 0 0 2px var(--blue-100);
        }

        .input-field-wrapper textarea {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-family: inherit;
            font-size: 14px;
            resize: none;
            padding: 8px 0;
            max-height: 80px;
            line-height: 1.4;
            color: var(--gray-900);
        }
        .input-field-wrapper textarea::placeholder { color: var(--gray-400); }

        .send-btn {
            background: var(--blue-600);
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: var(--radius-full);
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.15s, transform 0.15s;
        }
        .send-btn:hover { background: var(--blue-700); }
        .send-btn:active { transform: scale(0.92); }
        .send-btn:disabled { background: var(--gray-300); cursor: not-allowed; transform: none; }
        .send-btn svg { fill: var(--white); width: 18px; height: 18px; }

        /* Quick replies for pharmacist */
        .quick-replies {
            display: flex;
            gap: 6px;
            padding: 0 4px 6px;
            overflow-x: auto;
            flex-shrink: 0;
            scrollbar-width: none;
        }
        .quick-replies::-webkit-scrollbar { display: none; }

        .quick-reply-chip {
            background: var(--green-50);
            border: 1px solid var(--green-200);
            border-radius: var(--radius-full);
            padding: 5px 12px;
            font-size: 12px;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.15s;
            color: var(--green-700);
            flex-shrink: 0;
            font-family: inherit;
        }
        .quick-reply-chip:hover {
            background: var(--green-100);
            border-color: var(--green-500);
        }
        .quick-reply-chip:active { transform: scale(0.96); }

        /* ========================
           RESPONSIVE
           ======================== */
        @media (max-width: 720px) {
            .sidebar { width: 100%; min-width: 0; border-right: none; }
            .chat-panel { display: none; }
            .chat-panel.open {
                display: flex;
                position: fixed;
                top: 0; left: 0; right: 0; bottom: 0;
                z-index: 100;
            }
            .chat-panel .back-to-list { display: flex; }
        }
        @media (min-width: 721px) {
            .back-to-list { display: none; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-header-left">
                    <div class="pharmacist-avatar">Ф</div>
                    <div class="pharmacist-info">
                        <h2>Алексей Фармацевтов</h2>
                        <p>Аптека №1 · ул. Ленина, 25</p>
                    </div>
                </div>
                <button class="online-toggle online" id="onlineToggle" onclick="toggleOnline()">
                    <span class="toggle-dot"></span>
                    <span id="onlineText">Онлайн</span>
                </button>
            </div>

            <div class="search-bar">
                <div class="search-input-wrapper">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="searchInput" placeholder="Поиск по чатам..." oninput="filterChats()">
                </div>
            </div>

            <div class="filter-tabs" id="filterTabs">
                <button class="filter-tab active" data-filter="all" onclick="setFilter(this)">Все <span class="count-badge" id="countAll">5</span></button>
                <button class="filter-tab" data-filter="new" onclick="setFilter(this)">Новые <span class="count-badge" id="countNew">2</span></button>
                <button class="filter-tab" data-filter="active" onclick="setFilter(this)">Активные <span class="count-badge" id="countActive">3</span></button>
                <button class="filter-tab" data-filter="completed" onclick="setFilter(this)">Завершённые <span class="count-badge" id="countCompleted">0</span></button>
            </div>

            <div class="chat-list" id="chatList"></div>
        </aside>

        <!-- CHAT PANEL -->
        <div class="chat-panel empty" id="chatPanel">
            <div class="empty-state" id="emptyState">
                <svg width="200" height="140" viewBox="0 0 200 140" fill="none">
                    <rect x="10" y="20" width="180" height="100" rx="12" stroke="#d1d5db" stroke-width="2" fill="#f9fafb"/>
                    <rect x="25" y="35" width="60" height="8" rx="4" fill="#e5e7eb"/>
                    <rect x="25" y="50" width="100" height="6" rx="3" fill="#e5e7eb"/>
                    <rect x="25" y="62" width="80" height="6" rx="3" fill="#e5e7eb"/>
                    <rect x="140" y="80" width="40" height="8" rx="4" fill="#3b82f6" opacity="0.3"/>
                    <rect x="25" y="80" width="90" height="8" rx="4" fill="#e5e7eb"/>
                    <rect x="25" y="95" width="70" height="6" rx="3" fill="#e5e7eb"/>
                    <circle cx="170" cy="100" r="18" fill="#3b82f6" opacity="0.12"/>
                    <path d="M165 100h10M170 95v10" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
                </svg>
                <h3>Выберите чат</h3>
                <p>Нажмите на чат из списка, чтобы начать консультацию</p>
            </div>

            <div class="chat-header" id="chatHeader" style="display:none;">
                <button class="chat-header-btn back-to-list" onclick="closeChatPanel()" aria-label="Назад">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
                <div class="chat-header-avatar" id="chatHeaderAvatar" style="background: linear-gradient(135deg, #16a34a, #3b82f6);">В</div>
                <div class="chat-header-info">
                    <div class="chat-header-name" id="chatHeaderName">Владимир П.</div>
                    <div class="chat-header-status" id="chatHeaderStatus">был(а) в сети 5 мин. назад</div>
                </div>
                <div class="chat-header-actions">
                    <button class="chat-header-btn" onclick="alert('Завершить консультацию')" aria-label="Завершить">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle><line x1="8" y1="12" x2="16" y2="12"></line>
                        </svg>
                    </button>
                    <button class="chat-header-btn" onclick="alert('Информация')" aria-label="Информация">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="messages-area" id="chatMessages" style="display:none;"></div>

            <div class="typing-indicator" id="typingIndicator">
                <div class="message-avatar" style="background: linear-gradient(135deg, #16a34a, #3b82f6);">В</div>
                <div class="typing-dots"><span></span><span></span><span></span></div>
            </div>

            <div class="input-area" id="inputArea" style="display:none;">
                <div class="quick-replies" id="pharmacistQuickReplies">
                    <button class="quick-reply-chip" onclick="useQuickReply(this)">👋 Здравствуйте!</button>
                    <button class="quick-reply-chip" onclick="useQuickReply(this)">💊 Проверяю наличие...</button>
                    <button class="quick-reply-chip" onclick="useQuickReply(this)">✅ Есть в наличии</button>
                    <button class="quick-reply-chip" onclick="useQuickReply(this)">❌ Нет в наличии</button>
                    <button class="quick-reply-chip" onclick="useQuickReply(this)">💰 Цена: подскажите цену</button>
                </div>
                <div class="input-row">
                    <div class="input-field-wrapper">
                        <textarea id="pharmacistInput" rows="1" placeholder="Напишите сообщение..." oninput="autoResize(this)" onkeydown="handleKeyDown(event)"></textarea>
                        <button class="send-btn" id="pharmacistSendBtn" onclick="sendPharmacistMessage()" disabled aria-label="Отправить">
                            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // DATA
        // ============================================
        const conversations = [{
            id: 1,
            user: { name: 'Владимир П.', avatar: 'В', color: '#16a34a', online: true, lastSeen: 'только что' },
            lastMessage: 'Спасибо за информацию! А какие есть в аптеке по ул. Советской?',
            lastTime: '11:42', status: 'new', unread: 2,
            messages: [
                { id: 1, sender: 'user', text: 'Здравствуйте! Есть ли в наличии Цитрамон?', time: '11:30' },
                { id: 2, sender: 'pharmacist', text: 'Здравствуйте! Да, Цитрамон есть. В какой аптеке вам удобнее забрать?', time: '11:32' },
                { id: 3, sender: 'user', text: 'На улице Ленина, 25', time: '11:35' },
                { id: 4, sender: 'pharmacist', text: 'Отлично! В аптеке №1 на Ленина, 25 есть 120 шт. Цена 2.10 руб.', time: '11:38' },
                { id: 5, sender: 'user', text: 'Спасибо за информацию! А какие есть в аптеке по ул. Советской?', time: '11:42' },
            ]
        }, {
            id: 2,
            user: { name: 'Елена К.', avatar: 'Е', color: '#ea580c', online: false, lastSeen: '15 мин. назад' },
            lastMessage: 'Мне нужен аналог Нурофена для ребёнка',
            lastTime: '10:15', status: 'active', unread: 1,
            messages: [
                { id: 1, sender: 'user', text: 'Добрый день! Мне нужен аналог Нурофена для ребёнка', time: '10:15' },
                { id: 2, sender: 'pharmacist', text: 'Добрый день! Какой возраст ребёнка?', time: '10:17' },
            ]
        }, {
            id: 3,
            user: { name: 'Дмитрий С.', avatar: 'Д', color: '#7c3aed', online: true, lastSeen: 'онлайн' },
            lastMessage: 'Забронируйте, пожалуйста',
            lastTime: '09:48', status: 'active', unread: 0,
            messages: [
                { id: 1, sender: 'user', text: 'Есть ли Аспирин-Кардио?', time: '09:40' },
                { id: 2, sender: 'pharmacist', text: 'Да, есть. Цена 1.50 руб. Хотите забронировать?', time: '09:43' },
                { id: 3, sender: 'user', text: 'Забронируйте, пожалуйста', time: '09:48' },
            ]
        }, {
            id: 4,
            user: { name: 'Анна М.', avatar: 'А', color: '#ec4899', online: false, lastSeen: '2 часа назад' },
            lastMessage: 'Спасибо, я подумаю',
            lastTime: '08:20', status: 'completed', unread: 0,
            messages: [
                { id: 1, sender: 'user', text: 'Здравствуйте, какая цена на витамин D?', time: '08:00' },
                { id: 2, sender: 'pharmacist', text: 'Здравствуйте! Витамин D 2000 МЕ — 12.50 руб. Есть несколько производителей', time: '08:05' },
                { id: 3, sender: 'user', text: 'Спасибо, я подумаю', time: '08:20' },
            ]
        }, {
            id: 5,
            user: { name: 'Сергей В.', avatar: 'С', color: '#2563eb', online: false, lastSeen: 'вчера' },
            lastMessage: 'Отлично, бронь подтверждаю!',
            lastTime: 'Вчера', status: 'completed', unread: 0,
            messages: [
                { id: 1, sender: 'user', text: 'Можно ли забронировать Парацетамол 500мг?', time: 'Вчера, 17:20' },
                { id: 2, sender: 'pharmacist', text: 'Да, конечно! Забронировал для вас в аптеке №3, ул. Победителей 10', time: 'Вчера, 17:25' },
                { id: 3, sender: 'user', text: 'Отлично, бронь подтверждаю!', time: 'Вчера, 17:30' },
            ]
        }];

        // ============================================
        // STATE
        // ============================================
        let currentConversation = null;
        let currentFilter = 'all';
        let isPharmacistOnline = true;
        let messageIdCounter = 100;

        const chatList = document.getElementById('chatList');
        const chatPanel = document.getElementById('chatPanel');
        const emptyState = document.getElementById('emptyState');
        const chatHeader = document.getElementById('chatHeader');
        const chatMessages = document.getElementById('chatMessages');
        const inputArea = document.getElementById('inputArea');
        const pharmacistInput = document.getElementById('pharmacistInput');
        const pharmacistSendBtn = document.getElementById('pharmacistSendBtn');
        const typingIndicator = document.getElementById('typingIndicator');

        // ============================================
        // RENDER CHAT LIST
        // ============================================
        function renderChatList(filter = 'all') {
            const filtered = filter === 'all' ? conversations : conversations.filter(c => c.status === filter);
            chatList.innerHTML = '';
            if (filtered.length === 0) {
                chatList.innerHTML = `<div style="text-align:center;padding:40px 20px;color:var(--gray-500);"><p style="font-size:14px;">Нет чатов в этой категории</p></div>`;
                return;
            }
            filtered.forEach(conv => {
                const item = document.createElement('div');
                item.className = `chat-item ${currentConversation?.id === conv.id ? 'active' : ''}`;
                item.onclick = () => openChat(conv);
                let statusText = '';
                if (conv.status === 'new') statusText = '🆕 Новый';
                else if (conv.status === 'active') statusText = 'Активный';
                item.innerHTML = `
                    <div class="chat-item-avatar" style="background:${conv.user.color};">
                        ${conv.user.avatar}
                        ${conv.user.online ? '<span class="online-badge"></span>' : ''}
                    </div>
                    <div class="chat-item-content">
                        <div class="chat-item-top">
                            <span class="chat-item-name">${conv.user.name}</span>
                            <span class="chat-item-time">${conv.lastTime}</span>
                        </div>
                        <div class="chat-item-preview">
                            <span class="chat-item-text">${conv.lastMessage}</span>
                            ${conv.unread > 0 ? `<span class="chat-item-badge">${conv.unread}</span>` : ''}
                        </div>
                        ${statusText ? `<div class="chat-item-status">${statusText}</div>` : ''}
                    </div>
                `;
                chatList.appendChild(item);
            });
        }

        // ============================================
        // OPEN CHAT
        // ============================================
        function openChat(conv) {
            currentConversation = conv;
            conv.unread = 0;
            document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
            emptyState.style.display = 'none';
            chatHeader.style.display = 'flex';
            chatMessages.style.display = 'flex';
            inputArea.style.display = 'block';

            const colors = { 'В': '#16a34a', 'Е': '#ea580c', 'Д': '#7c3aed', 'А': '#ec4899', 'С': '#2563eb' };
            document.getElementById('chatHeaderAvatar').style.background = `linear-gradient(135deg, ${colors[conv.user.avatar] || '#16a34a'}, ${conv.user.color})`;
            document.getElementById('chatHeaderAvatar').textContent = conv.user.avatar;
            document.getElementById('chatHeaderName').textContent = conv.user.name;
            const statusEl = document.getElementById('chatHeaderStatus');
            statusEl.textContent = conv.user.online ? 'онлайн' : `был(а) в сети ${conv.user.lastSeen}`;
            statusEl.className = `chat-header-status ${conv.user.online ? 'online' : 'offline'}`;

            if (window.innerWidth <= 720) chatPanel.classList.add('open');
            renderChatMessages(conv);
            updateCounts();
            renderChatList(currentFilter);
        }

        // ============================================
        // RENDER MESSAGES
        // ============================================
        function renderChatMessages(conv) {
            chatMessages.innerHTML = '';
            let currentDate = '';
            conv.messages.forEach(msg => {
                if (msg.date !== currentDate) {
                    currentDate = msg.date || 'Сегодня';
                    const d = document.createElement('div');
                    d.className = 'date-sep';
                    d.innerHTML = `<span>${currentDate}</span>`;
                    chatMessages.appendChild(d);
                }
                const wrapper = document.createElement('div');
                wrapper.className = `message-wrapper ${msg.sender === 'pharmacist' ? 'pharmacist' : 'user'}`;

                const avatar = document.createElement('div');
                avatar.className = 'message-avatar';
                avatar.style.background = msg.sender === 'pharmacist'
                    ? 'linear-gradient(135deg, #2563eb, #6366f1)'
                    : `linear-gradient(135deg, ${conv.user.color}, ${conv.user.color}dd)`;
                avatar.textContent = msg.sender === 'pharmacist' ? 'Ф' : conv.user.avatar;

                const bubble = document.createElement('div');
                bubble.className = 'message-bubble';
                if (msg.sender === 'user') {
                    const n = document.createElement('div');
                    n.className = 'message-sender-name';
                    n.textContent = conv.user.name;
                    bubble.appendChild(n);
                }
                const textDiv = document.createElement('div');
                textDiv.className = 'message-text';
                textDiv.innerHTML = msg.text.replace(/\n/g, '<br>');
                bubble.appendChild(textDiv);

                const meta = document.createElement('div');
                meta.className = 'message-meta';
                const time = document.createElement('span');
                time.className = 'message-time';
                time.textContent = msg.time;
                meta.appendChild(time);
                bubble.appendChild(meta);

                wrapper.appendChild(avatar);
                wrapper.appendChild(bubble);
                chatMessages.appendChild(wrapper);
            });
            scrollChatToBottom();
        }

        function scrollChatToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // ============================================
        // SEND MESSAGE
        // ============================================
        function sendPharmacistMessage() {
            const text = pharmacistInput.value.trim();
            if (!text || !currentConversation) return;

            messageIdCounter++;
            const now = new Date();
            const time = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');

            const newMsg = { id: messageIdCounter, sender: 'pharmacist', text, time, date: 'Сегодня' };
            currentConversation.messages.push(newMsg);
            currentConversation.lastMessage = text;
            currentConversation.lastTime = time;
            if (currentConversation.status === 'new') currentConversation.status = 'active';

            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper pharmacist';
            wrapper.innerHTML = `
                <div class="message-avatar" style="background:linear-gradient(135deg,#2563eb,#6366f1);">Ф</div>
                <div class="message-bubble">
                    <div class="message-text">${text.replace(/\n/g, '<br>')}</div>
                    <div class="message-meta"><span class="message-time">${time}</span></div>
                </div>`;
            chatMessages.appendChild(wrapper);
            scrollChatToBottom();

            pharmacistInput.value = '';
            autoResize(pharmacistInput);
            updatePharmacistSendBtn();
            renderChatList(currentFilter);
            updateCounts();

            setTimeout(() => simulateUserTyping(), 2000 + Math.random() * 3000);
        }

        function simulateUserTyping() {
            if (!currentConversation) return;
            typingIndicator.classList.add('active');
            scrollChatToBottom();

            setTimeout(() => {
                typingIndicator.classList.remove('active');
                messageIdCounter++;
                const now = new Date();
                const time = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');

                const replies = [
                    'Спасибо за информацию! Я подумаю.',
                    'Отлично, меня устраивает. Можно забронировать?',
                    'Понял, спасибо! А ещё есть что-то похожее?',
                    'Хорошо, спасибо за консультацию!',
                ];
                const replyText = replies[Math.floor(Math.random() * replies.length)];

                const newMsg = { id: messageIdCounter, sender: 'user', text: replyText, time, date: 'Сегодня' };
                currentConversation.messages.push(newMsg);
                currentConversation.lastMessage = replyText;
                currentConversation.lastTime = time;
                currentConversation.unread = (currentConversation.unread || 0) + 1;

                const conv = currentConversation;
                const wrapper = document.createElement('div');
                wrapper.className = 'message-wrapper user';
                wrapper.innerHTML = `
                    <div class="message-avatar" style="background:linear-gradient(135deg,${conv.user.color},${conv.user.color}dd);">${conv.user.avatar}</div>
                    <div class="message-bubble">
                        <div class="message-sender-name">${conv.user.name}</div>
                        <div class="message-text">${replyText}</div>
                        <div class="message-meta"><span class="message-time">${time}</span></div>
                    </div>`;
                chatMessages.appendChild(wrapper);
                scrollChatToBottom();
                renderChatList(currentFilter);
                updateCounts();
            }, 2000 + Math.random() * 2000);
        }

        // ============================================
        // HELPERS
        // ============================================
        function updatePharmacistSendBtn() {
            pharmacistSendBtn.disabled = !pharmacistInput.value.trim();
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 80) + 'px';
            updatePharmacistSendBtn();
        }

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault();
                sendPharmacistMessage(); }
        }

        function useQuickReply(btn) {
            const text = btn.textContent.replace(/^[^\s]+\s/, '');
            pharmacistInput.value = text;
            autoResize(pharmacistInput);
            pharmacistInput.focus();
        }

        function closeChatPanel() { chatPanel.classList.remove('open'); }

        function toggleOnline() {
            isPharmacistOnline = !isPharmacistOnline;
            const toggle = document.getElementById('onlineToggle');
            const text = document.getElementById('onlineText');
            toggle.className = `online-toggle ${isPharmacistOnline ? 'online' : 'offline'}`;
            text.textContent = isPharmacistOnline ? 'Онлайн' : 'Офлайн';
        }

        function setFilter(btn) {
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            renderChatList(currentFilter);
        }

        function filterChats() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            chatList.querySelectorAll('.chat-item').forEach(item => {
                const name = item.querySelector('.chat-item-name')?.textContent?.toLowerCase() || '';
                const text = item.querySelector('.chat-item-text')?.textContent?.toLowerCase() || '';
                item.style.display = (name.includes(q) || text.includes(q)) ? '' : 'none';
            });
        }

        function updateCounts() {
            document.getElementById('countAll').textContent = conversations.length;
            document.getElementById('countNew').textContent = conversations.filter(c => c.status === 'new').length;
            document.getElementById('countActive').textContent = conversations.filter(c => c.status === 'active').length;
            document.getElementById('countCompleted').textContent = conversations.filter(c => c.status === 'completed').length;
        }

        // ============================================
        // INIT
        // ============================================
        renderChatList('all');
        updateCounts();
        const firstNew = conversations.find(c => c.status === 'new');
        if (firstNew) openChat(firstNew);
    </script>
</body>
</html>

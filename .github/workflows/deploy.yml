name: Deploy to Production

on:
  push:
    branches: [main, develop]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_env:
        description: "Deploy environment"
        required: false
        default: "production"
        type: choice
        options:
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: aleksandrandreew-dev/novamedika-lts
  DOCKER_COMPOSE_FILE: docker-compose.traefik.prod.yml
  DOMAIN: spravka.novamedika.com
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: [self-hosted, linux, novamedika-runner]
    strategy:
      matrix:
        node-version: [22.x]
        python-version: [3.12]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install Python dependencies
        run: |
          cd backend
          pip install -e .[dev]

      - name: Run Python tests
        env:
          DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/test_db"
          ASYNCPG_DATABASE_URL: "postgresql://test:test@localhost:5432/test_db"
          SECRET_KEY: "test-secret-key-for-ci"
        run: |
          cd backend
          python -c "import sys; from src.main import app; print('✅ Backend imports work')"

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node.js dependencies
        run: |
          cd frontend
          npm ci

      - name: Run React tests and build
        run: |
          cd frontend
          npm run build
          echo "✅ Frontend builds successfully"

      - name: Lint code
        run: |
          cd frontend
          npm run lint

  build-and-push:
    needs: test
    runs-on: [self-hosted, linux, novamedika-runner]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry (with retry)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        # Retry up to 3 times on TLS/network errors
        continue-on-error: true
        id: docker-login

      - name: Retry Docker login if failed
        if: steps.docker-login.outcome == 'failure'
        shell: bash
        run: |
          echo "⚠️ First login attempt failed, retrying in 15 seconds..."
          sleep 15
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Second retry for Docker login if still failed
        if: steps.docker-login.outcome == 'failure'
        shell: bash
        run: |
          echo "⚠️ Second login attempt failed, retrying in 30 seconds..."
          sleep 30
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push backend image (with retry)
        id: build-backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
        continue-on-error: true

      - name: Retry backend push if failed
        if: steps.build-backend.outcome == 'failure'
        shell: bash
        run: |
          echo "⚠️ Backend push failed, retrying in 20 seconds..."
          sleep 20
        continue-on-error: true

      - name: Build and push backend image (retry attempt)
        if: steps.build-backend.outcome == 'failure'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Extract metadata (tags, labels) for Docker Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push frontend image (with retry)
        id: build-frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: prod
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
        continue-on-error: true

      - name: Retry frontend push if failed
        if: steps.build-frontend.outcome == 'failure'
        shell: bash
        run: |
          echo "⚠️ Frontend push failed, retrying in 20 seconds..."
          sleep 20
        continue-on-error: true

      - name: Build and push frontend image (retry attempt)
        if: steps.build-frontend.outcome == 'failure'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: prod
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Extract metadata (tags, labels) for Docker Pharmacist WebApp
        id: meta-pharmacist
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/pharmacist-webapp
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push pharmacist webapp image (with retry)
        id: build-pharmacist
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.pharmacist
          target: prod
          push: true
          tags: ${{ steps.meta-pharmacist.outputs.tags }}
          labels: ${{ steps.meta-pharmacist.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
        continue-on-error: true

      - name: Retry pharmacist webapp push if failed
        if: steps.build-pharmacist.outcome == 'failure'
        shell: bash
        run: |
          echo "⚠️ Pharmacist webapp push failed, retrying in 20 seconds..."
          sleep 20
        continue-on-error: true

      - name: Build and push pharmacist webapp image (retry attempt)
        if: steps.build-pharmacist.outcome == 'failure'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.pharmacist
          target: prod
          push: true
          tags: ${{ steps.meta-pharmacist.outputs.tags }}
          labels: ${{ steps.meta-pharmacist.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

  deploy-production:
    needs: build-and-push
    runs-on: [self-hosted, linux, novamedika-runner]
    if: github.ref == 'refs/heads/main'

    environment: production

    steps:
      - name: Upload docker-compose.traefik.prod.yml to server
        uses: appleboy/scp-action@v0.1.2
        with:
          host: ${{ secrets.PRODUCTION_SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: docker-compose.traefik.prod.yml
          target: /opt/novamedika-prod/
          strip_components: 0
          overwrite: true
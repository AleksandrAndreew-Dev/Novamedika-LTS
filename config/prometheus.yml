# Prometheus конфигурация для NovaMedika2
# Сбор метрик от Traefik, Backend, PostgreSQL, Redis

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Alertmanager configuration (опционально, можно добавить позже)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Rule files for alerts
# rule_files:
#   - "alert_rules.yml"

scrape_configs:
  # Traefik metrics
  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8080']
    metrics_path: '/metrics'
    scrape_interval: 15s
    
  # Backend FastAPI metrics (если добавим prometheus-fastapi-instrumentator)
  - job_name: 'backend'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics'
    scrape_interval: 15s
    # Временно отключено до добавления instrumentator
    # enabled: false
    
  # PostgreSQL exporter metrics (OAC compliance - database monitoring)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres_exporter:9187']
    scrape_interval: 15s
    
  # Redis exporter metrics (OAC compliance - cache monitoring)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis_exporter:9121']
    scrape_interval: 15s
    
  # Node exporter for system metrics (OAC compliance - infrastructure monitoring)
  - job_name: 'node'
    static_configs:
      - targets: ['node_exporter:9100']
    scrape_interval: 15s

# Prometheus конфигурация для NovaMedika2
# Сбор метрик от Traefik, Backend, PostgreSQL, Redis

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Alertmanager configuration (опционально, можно добавить позже)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Rule files for alerts
# rule_files:
#   - "alert_rules.yml"

scrape_configs:
  # Traefik metrics
  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8080']
    metrics_path: '/metrics'
    scrape_interval: 15s
    
  # Backend FastAPI metrics (если добавим prometheus-fastapi-instrumentator)
  - job_name: 'backend'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics'
    scrape_interval: 15s
    # Временно отключено до добавления instrumentator
    # enabled: false
    
  # Node exporter для системных метрик хоста (опционально)
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node-exporter:9100']

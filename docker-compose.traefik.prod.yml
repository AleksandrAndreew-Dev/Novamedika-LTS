services:
  traefik:
    image: traefik:v3.6.2
    container_name: traefik-prod
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    command:
      - --api.dashboard=true
      - --api.insecure=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=${SSL_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --log.level=INFO
      - --accesslog=true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./letsencrypt:/letsencrypt
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.middlewares=traefik-auth"
      - "traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_AUTH_USERS}"
      # Security headers middleware
      - "traefik.http.middlewares.security-headers.headers.customframeoptionsvalue=SAMEORIGIN"
      - "traefik.http.middlewares.security-headers.headers.contenttypenosniff=true"
      - "traefik.http.middlewares.security-headers.headers.referrerpolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.security-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.security-headers.headers.forcestsheader=true"
      - "traefik.http.middlewares.security-headers.headers.stsseconds=31536000"
      - "traefik.http.middlewares.security-headers.headers.stsincludesubdomains=true"
      - "traefik.http.middlewares.security-headers.headers.stspreload=true"
      # Разрешаем загрузку ресурсов для Swagger UI (/docs)
      - "traefik.http.middlewares.security-headers.headers.contentsecuritypolicy=default-src 'self'; script-src 'self' https://telegram.org https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: blob:; font-src 'self' https://cdn.jsdelivr.net; connect-src 'self' https://api.${DOMAIN}; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
      - "traefik.http.middlewares.security-headers.headers.permissionspolicy=geolocation=(), microphone=(), camera=()"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
        reservations:
          memory: 64M
    restart: unless-stopped

  backend:
    image: ghcr.io/aleksandrandreew-dev/novamedika-lts/backend:latest
    container_name: backend-prod
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
      - SECRET_KEY=${SECRET_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - FRONTEND_URL=https://spravka.novamedika.com
      # Ключ шифрования для персональных данных (ОАЦ compliance)
      # Генерируйте безопасный ключ: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
      - "traefik.http.routers.backend.middlewares=security-headers"
    volumes:
      - ./uploaded_csv:/app/uploaded_csv:rw
    networks:
      - traefik-public
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.50"
        reservations:
          memory: 384M
    restart: unless-stopped

  frontend:
    image: ghcr.io/aleksandrandreew-dev/novamedika-lts/frontend:latest
    user: "100:102"
    container_name: frontend-prod
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - VITE_API_URL=${VITE_API_URL}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`spravka.novamedika.com`) || Host(`www.spravka.novamedika.com`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.routers.frontend-http.rule=Host(`spravka.novamedika.com`)"
      - "traefik.http.routers.frontend-http.entrypoints=web"
      - "traefik.http.routers.frontend-http.middlewares=redirect-to-https"
      - "traefik.http.routers.frontend.middlewares=security-headers"
    networks:
      - traefik-public
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"
        reservations:
          memory: 32M
    restart: unless-stopped

  pharmacist_webapp:
    image: ghcr.io/aleksandrandreew-dev/novamedika-lts/pharmacist-webapp:latest
    container_name: pharmacist-webapp-prod
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - VITE_API_URL=${VITE_API_URL}
      - VITE_WS_URL=${VITE_WS_URL_PHARMACIST}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pharmacist-webapp.rule=Host(`pharmacist.spravka.novamedika.com`)"
      - "traefik.http.routers.pharmacist-webapp.entrypoints=websecure"
      - "traefik.http.routers.pharmacist-webapp.tls.certresolver=letsencrypt"
      - "traefik.http.services.pharmacist-webapp.loadbalancer.server.port=80"
      - "traefik.http.routers.pharmacist-webapp.middlewares=security-headers"
    networks:
      - traefik-public
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"
        reservations:
          memory: 32M
    restart: unless-stopped

  postgres:
    image: postgres:17
    container_name: postgres-prod
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    command: >
      postgres
      -c shared_buffers=512MB
      -c effective_cache_size=2GB
      -c work_mem=8MB
      -c maintenance_work_mem=128MB
      -c max_connections=50
      -c max_worker_processes=2
      -c max_parallel_workers_per_gather=1
      -c checkpoint_timeout=10min
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c wal_level=replica
      -c max_wal_senders=0
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - traefik-public
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: "1.00"
        reservations:
          memory: 768M
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis-prod
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 200mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    networks:
      - traefik-public
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
        reservations:
          memory: 128M
    restart: unless-stopped

  celery_worker:
    image: ghcr.io/aleksandrandreew-dev/novamedika-lts/backend:latest
    container_name: celery-worker-prod
    user: "1000:1000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
      - SECRET_KEY=${SECRET_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=${DATABASE_URL}
      - ASYNCPG_DATABASE_URL=${ASYNCPG_DATABASE_URL}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_HOST=redis
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_WORKER_CONCURRENCY=2
      - CELERY_WORKER_PREFETCH_MULTIPLIER=1
      - PYTHONPATH=/app/src
      - CELERY_WORKER_MAX_TASKS_PER_CHILD=100
      - CELERY_TASK_ALWAYS_EAGER=False
    entrypoint: ["/app/celery-entrypoint.sh"]
    command:
      - /app/.venv/bin/celery
      - -A
      - tasks.celery_app
      - worker
      - --loglevel=warning
      - --concurrency=2
      - --pool=prefork
      - --without-gossip
      - --without-mingle
      - --without-heartbeat
      - --task-events
      - --prefetch-multiplier=1
      - --max-tasks-per-child=100
      - --max-memory-per-child=256000
    networks:
      - traefik-public
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "/app/.venv/bin/celery -A tasks.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.00"
        reservations:
          memory: 256M
    restart: unless-stopped